spring.application.name=boilerplate

# Common - DB
spring.datasource.url=jdbc:mysql://apne2-peloton-dev.cqm0fqgkqyk7.ap-northeast-2.rds.amazonaws.com/admin?useSSL=false&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
spring.datasource.username=admin
spring.datasource.password=peloton2023!

spring.datasource.hikari.maximumPoolSize=10
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Log
spring.jpa.properties.hibernate.types.print.banner=false
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
decorator.datasource.p6spy.enable-logging=true

# Server
server.port=15422

# Swagger 설정 - Spring Boot 버전과 Swagger 버전이 호환안되는 경우 설정
spring.mvc.pathmatch.matching-strategy = ANT_PATH_MATCHER

# URL이 정의되어 있지 않은 요청이 올 경우, GlobalExceptionHandler로 Handling 시키기 위한 설정
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# devtool에 의해 build시 자동 reload
spring.devtools.livereload.enabled=true

